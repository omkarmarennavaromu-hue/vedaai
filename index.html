<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Omkar AI Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f17;
      color: #fff;
    }

    .center {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #121a2a;
      padding: 24px;
      border-radius: 16px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      background: #1b263b;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #4f7cff;
      color: white;
      cursor: pointer;
    }

    .dashboard {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
    }

    .box {
      background: #121a2a;
      padding: 16px;
      border-radius: 14px;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .bar {
      height: 8px;
      background: #1b263b;
      border-radius: 10px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      background: #4f7cff;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>
const app = document.getElementById("app");

let token = localStorage.getItem("token");

function showLogin() {
  app.innerHTML = `
    <div class="center">
      <div class="card">
        <h2>Omkar AI Login</h2>
        <input id="username" placeholder="Username" />
        <input id="password" type="password" placeholder="Password" />
        <button onclick="login()">Login</button>
      </div>
    </div>
  `;
}

async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:3001/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    token = data.token;
    loadDashboard();
  } else {
    alert("Login failed");
  }
}

async function loadDashboard() {
  const res = await fetch("http://localhost:3001/api/dashboard", {
    headers: {
      "Authorization": "Bearer " + token
    }
  });

  if (!res.ok) {
    localStorage.removeItem("token");
    showLogin();
    return;
  }

  const data = await res.json();

  app.innerHTML = `
    <div class="dashboard">
      <h1>Welcome, ${data.user}</h1>

      <div class="grid">

        <div class="box">
          <div class="title">Study Progress</div>
          <div>${data.progress}%</div>
        </div>

        <div class="box">
          <div class="title">Study Streak</div>
          <div>${data.streak} days 🔥</div>
        </div>

        <div class="box">
          <div class="title">Weak Topics</div>
          <ul>
            ${data.weakTopics.map(t => `<li>${t}</li>`).join("")}
          </ul>
        </div>

        <div class="box">
          <div class="title">Recommendations</div>
          <ul>
            ${data.recommendations.map(r => `<li>${r}</li>`).join("")}
          </ul>
        </div>

        <div class="box">
          <div class="title">Subjects</div>
          ${data.subjects.map(s => `
            <p>${s.name}</p>
            <div class="bar">
              <div class="fill" style="width:${s.progress}%"></div>
            </div>
          `).join("")}
        </div>

      </div>
    </div>
  `;
}

if (token) {
  loadDashboard();
} else {
  showLogin();
}
</script>

</body>
</html>
